{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: guestbook
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "guestbook.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.gatewayName }}
      namespace: {{ .Values.httpRoute.gatewayNamespace }}
      sectionName: {{ .Values.httpRoute.gatewaySectionName }}
  hostnames:
    - {{ .Values.httpRoute.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: guestbook
          port: {{ .Values.service.port }}
          {{- if .Values.rollout.enabled }}
          weight: 100
          {{- end }}
        {{- if .Values.rollout.enabled }}
        # Canary backendRef. Rollouts plugin owns these two `weight` values
        # at runtime — git always shows stable=100 / canary=0 (the desired
        # post-rollout resting state). Argo CD treats live weight drift as
        # benign because the Rollouts controller is the field manager;
        # ServerSideApply preserves that ownership.
        - name: guestbook-canary
          port: {{ .Values.service.port }}
          weight: 0
        {{- end }}
{{- end }}
