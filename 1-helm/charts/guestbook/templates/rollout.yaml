{{- if .Values.rollout.enabled }}
# Argo Rollout (replaces Deployment when rollout.enabled). Pod spec is
# identical to deployment.yaml — only the wrapping kind + canary strategy
# differ. The Gateway API plugin shifts HTTPRoute weight between the
# `guestbook` (stable) and `guestbook-canary` Services per the steps below.
#
# `dynamicStableScale: true` keeps total replica count steady across the
# rollout — at 25% canary weight, ~25% of pods serve canary, the rest serve
# stable. Without it Rollouts scales canary to full replicaCount, doubling
# pod budget mid-promotion.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: guestbook
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "guestbook.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: guestbook
  strategy:
    canary:
      canaryService: guestbook-canary
      stableService: guestbook
      dynamicStableScale: true
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: guestbook
            namespace: {{ .Values.namespace }}
      steps:
        {{- range .Values.rollout.steps }}
        {{- if hasKey . "setWeight" }}
        - setWeight: {{ .setWeight }}
        {{- else if hasKey . "pauseSeconds" }}
        - pause: { duration: {{ .pauseSeconds }}s }
        {{- end }}
        {{- end }}
      {{- if .Values.rollout.analysis.enabled }}
      analysis:
        startingStep: {{ .Values.rollout.analysis.startingStep }}
        templates:
          - templateName: {{ .Values.rollout.analysis.templateName }}
            clusterScope: false
        args:
          - name: service-name
            value: guestbook-canary
          - name: service-namespace
            value: {{ .Values.namespace }}
      {{- end }}
  template:
    metadata:
      labels:
        app: guestbook
        {{- include "guestbook.labels" . | nindent 8 }}
    spec:
      serviceAccountName: guestbook
      automountServiceAccountToken: false
      containers:
        - name: guestbook
          image: {{ include "guestbook.image" . }}
          ports:
            - name: http
              containerPort: {{ .Values.container.port }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.container.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
{{- end }}
