# Default values. Per-env overrides live in 1-helm/env/values-{dev,staging,prod}.yaml.
# Kargo overwrites image.tag (or image.digest) at promotion time.

# Namespace the chart deploys into. Per-env overlays override this.
namespace: guestbook

image:
  repository: gcr.io/google-samples/hello-app
  # Public registry only publishes 1.0 and 2.0 — pick a real tag so the
  # chart works pre-Kargo. Kargo's first promotion sets imageDigest
  # (flat, top-level) which takes precedence in _helpers.tpl.
  tag: "1.0"

# Flat top-level key — Kargo's yaml-update step mutates this at promotion
# time. Stays empty in defaults; per-env overlays seed it as "".
imageDigest: ""

replicaCount: 1
revisionHistoryLimit: 3

# PodDisruptionBudget. minAvailable: 1 is fine for replicaCount >= 1.
pdb:
  minAvailable: 1

service:
  port: 80
  targetPort: http

container:
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Pod Security Admission labels on the namespace.
podSecurityAdmission:
  enforce: restricted
  audit: restricted
  warn: restricted

# Gateway API HTTPRoute. Attaches to the platform-installed Traefik Gateway
# in the `traefik` namespace. Per-env values override `hostname`.
httpRoute:
  enabled: true
  gatewayName: traefik-gateway
  gatewayNamespace: traefik
  gatewaySectionName: web
  hostname: guestbook.local

# Progressive delivery via Argo Rollouts. When `enabled: true` the chart
# emits a Rollout (instead of Deployment) plus a `<name>-canary` Service.
# The HTTPRoute gets a second backendRef pointing at the canary Service,
# initial weight 0; the Gateway API plugin shifts weight per `steps`.
#
# `analysis.template` runs mid-rollout against in-cluster Prometheus —
# kube-prometheus-stack ships at tier 1, so the AnalysisTemplate
# `error-rate-prometheus` (in kargo-simple ns) is already in place.
# Default off — dev keeps RollingUpdate for fast feedback. Per-env values
# flip this on for staging/prod.
rollout:
  enabled: false
  steps:
    - setWeight: 10
    - pauseSeconds: 60
    - setWeight: 25
    - pauseSeconds: 60
    - setWeight: 50
    - pauseSeconds: 60
  analysis:
    enabled: true
    templateName: error-rate-prometheus
    templateNamespace: kargo-simple
    # Run analysis after the first weight bump and every step thereafter.
    startingStep: 2
