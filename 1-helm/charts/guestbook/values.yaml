# Default values. Per-env overrides live in 1-helm/env/values-{dev,staging,prod}.yaml.
# Kargo overwrites image.tag (or image.digest) at promotion time.

# Namespace the chart deploys into. Per-env overlays override this.
namespace: guestbook

image:
  repository: gcr.io/google-samples/hello-app
  tag: "0.0.1"
  # Kargo replaces this with a digest at promotion time. When set,
  # takes precedence over .tag. Leave empty in defaults.
  digest: ""

replicaCount: 1
revisionHistoryLimit: 3

# PodDisruptionBudget. minAvailable: 1 is fine for replicaCount >= 1.
pdb:
  minAvailable: 1

service:
  port: 80
  targetPort: http

container:
  port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Pod Security Admission labels on the namespace.
podSecurityAdmission:
  enforce: restricted
  audit: restricted
  warn: restricted

# Gateway API HTTPRoute. Attaches to the platform-installed Traefik Gateway
# in the `traefik` namespace. Per-env values override `hostname`.
httpRoute:
  enabled: true
  gatewayName: traefik-gateway
  gatewayNamespace: traefik
  gatewaySectionName: web
  hostname: guestbook.local
