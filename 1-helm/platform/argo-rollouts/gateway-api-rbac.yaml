# Extra RBAC for the Gateway API plugin. The base argo-rollouts ClusterRole
# does not include verbs on gateway.networking.k8s.io — without these, the
# controller can't mutate HTTPRoute weights and canary steps stall.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-rollouts-gateway-api
  labels:
    app.kubernetes.io/managed-by: argocd
    rbac.authorization.k8s.io/aggregate-to-argo-rollouts: "true"
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - httproutes
      - tcproutes
      - tlsroutes
      - udproutes
      - grpcroutes
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-rollouts-gateway-api
  labels:
    app.kubernetes.io/managed-by: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-rollouts-gateway-api
subjects:
  - kind: ServiceAccount
    name: argo-rollouts
    namespace: argo-rollouts
