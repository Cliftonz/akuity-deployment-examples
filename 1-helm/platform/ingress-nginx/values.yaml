# ingress-nginx values. Conservative on purpose — this is the front door, and
# every change has cluster-wide blast radius. PRs here get reviewed like
# infrastructure changes, not feature work.
controller:
  replicaCount: 2
  service:
    type: LoadBalancer
    externalTrafficPolicy: Local
  config:
    use-forwarded-headers: "true"
    enable-real-ip: "true"
    proxy-body-size: "16m"
  metrics:
    enabled: true
    # Without the ServiceMonitor, /metrics is exposed but nothing scrapes it —
    # request rate, 5xx rate, upstream latency all dark. The label selector
    # has to match whatever Prometheus Operator install you're running.
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
      scrapeInterval: 30s
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # podSecurityContext: leaving the chart default. Pinning a UID here used to
  # work but breaks the moment the chart upgrades its image; the chart already
  # picks the right user.
  admissionWebhooks:
    enabled: true
defaultBackend:
  enabled: false
