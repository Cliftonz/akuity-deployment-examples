# Tier-1 runbook manifest. Inherits tier-0 runbooks (sync failure, image
# pull, pod health) and adds Argo CD app-state runbooks plus a first
# security-flavored runbook (RBAC denials) that becomes critical once Dex
# SSO is wired and group claims drive AppProject access.
slackChannel: "#deploys"
runbooks:
  - file: argocd/app-sync-failure.md
    title: Argo CD Application sync failed
    trigger:
      resource: argoproj.io/Application
      state: SyncFailed
      durationSeconds: 60
    severity: sev2
    owner: platform-team
    autoclose:
      condition: status.sync.status == 'Synced'
      stableForSeconds: 300

  - file: argocd/app-degraded.md
    title: Argo CD Application Health = Degraded
    trigger:
      resource: argoproj.io/Application
      state: Degraded
      durationSeconds: 120
    severity: sev2
    owner: platform-team
    autoclose:
      condition: status.health.status == 'Healthy'
      stableForSeconds: 300

  - file: argocd/app-out-of-sync.md
    title: Argo CD Application stuck OutOfSync (autoSync disabled)
    trigger:
      resource: argoproj.io/Application
      state: OutOfSync
      durationSeconds: 600
    severity: sev3
    owner: platform-team

  - file: pod-issues/image-pull-failure.md
    title: Pod stuck in ImagePullBackOff
    trigger:
      resource: v1/Pod
      state: ImagePullBackOff
      durationSeconds: 120
    severity: sev2
    owner: platform-team

  - file: pod-issues/pod-health-issues.md
    title: Pod CrashLoopBackOff
    trigger:
      resource: v1/Pod
      state: CrashLoopBackOff
      durationSeconds: 180
    severity: sev2
    owner: platform-team

  - file: security/rbac-denials.md
    title: RBAC access denied (audit log)
    trigger:
      resource: audit.k8s.io/Event
      state: Forbidden
      durationSeconds: 0
    severity: sev3
    owner: security-team
