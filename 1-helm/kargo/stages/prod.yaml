apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: kargo-simple
  # No annotation here for "manual approval" — that's the default. prod
  # isn't in ProjectConfig.promotionPolicies with autoPromotionEnabled, so
  # nothing moves freight in here without a human clicking promote.
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: guestbook
      sources:
        stages:
          - staging
  # Post-promote verification, same two-layer model as staging. Argo CD
  # already blocked until the prod canary fully promoted (slower steps,
  # 5–10min pauses); this block adds a final SLO gate on the stable
  # Service. Failure pins freight here — there's no further stage anyway,
  # so the practical effect is an alert + a PagerDuty page via the
  # notifications.argoproj.io subscriptions on the Application.
  verification:
    analysisTemplates:
      - name: guestbook-http-probe
      - name: error-rate-prometheus
    args:
      - name: service-name
        value: guestbook
      - name: service-namespace
        value: guestbook-prod
  promotionTemplate:
    spec:
      vars:
        - name: gitRepo
          value: https://github.com/Cliftonz/akuity-deployment-examples
        - name: imageRepo
          value: gcr.io/google-samples/hello-app
        - name: env
          value: prod
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.gitRepo }}
            checkout:
              - branch: main
                path: ./src
              - branch: env/${{ vars.env }}
                create: true
                path: ./out
        - uses: helm-update-image
          as: update-image
          config:
            path: ./src/1-helm/env/values-${{ vars.env }}.yaml
            images:
              - image: ${{ vars.imageRepo }}
                key: image.digest
                value: ${{ imageFrom(vars.imageRepo).Digest }}
        - uses: helm-template
          config:
            path: ./src/1-helm/charts/guestbook
            valuesFiles:
              - ./src/1-helm/env/values-${{ vars.env }}.yaml
            outPath: ./src/manifests.yaml
        - uses: copy
          config:
            inPath: ./src/manifests.yaml
            outPath: ./out/rendered/${{ vars.env }}/manifests.yaml
        - uses: git-commit
          as: commit
          config:
            path: ./out
            message: ${{ outputs['update-image'].commitMessage }}
        - uses: git-push
          config:
            path: ./out
            targetBranch: env/${{ vars.env }}
        - uses: argocd-update
          config:
            apps:
              - name: guestbook-${{ vars.env }}
                sources:
                  - repoURL: ${{ vars.gitRepo }}
                    desiredRevision: ${{ outputs.commit.commit }}
