apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: kargo-simple
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: guestbook
      sources:
        stages:
          - dev
  # Two-layer verification once canary lands:
  #   1. argocd-update step blocks until Argo CD reports the app Healthy —
  #      Rollouts' health check only flips Healthy after the canary fully
  #      promotes (every weight step + in-rollout AnalysisRun passes).
  #      So a failed canary fails the promotion before this block runs.
  #   2. This `verification` block then runs post-promote SLO checks on
  #      the (now-stable) Service. Failure here doesn't roll back, but
  #      pins freight in this Stage — prod won't pull it forward.
  verification:
    analysisTemplates:
      - name: guestbook-http-probe
      - name: error-rate-prometheus
    args:
      - name: service-name
        value: guestbook
      - name: service-namespace
        value: guestbook-staging
  promotionTemplate:
    spec:
      vars:
        - name: gitRepo
          value: https://github.com/Cliftonz/akuity-deployment-examples
        - name: imageRepo
          value: gcr.io/google-samples/hello-app
        - name: env
          value: staging
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.gitRepo }}
            checkout:
              - branch: main
                path: ./src
              - branch: env/${{ vars.env }}
                create: true
                path: ./out
        - uses: yaml-update
          as: update-image
          config:
            path: ./src/1-helm/env/values-${{ vars.env }}.yaml
            updates:
              - key: imageDigest
                value: ${{ imageFrom(vars.imageRepo).Digest }}
        - uses: helm-template
          config:
            releaseName: guestbook
            path: ./src/1-helm/charts/guestbook
            valuesFiles:
              - ./src/1-helm/env/values-${{ vars.env }}.yaml
            outPath: ./src/manifests.yaml
        - uses: copy
          config:
            inPath: ./src/manifests.yaml
            outPath: ./out/rendered/${{ vars.env }}/manifests.yaml
        - uses: git-commit
          as: commit
          config:
            path: ./out
            message: 'chore(${{ vars.env }}): bump guestbook image to ${{ imageFrom(vars.imageRepo).Tag }}'
        - uses: git-push
          config:
            path: ./out
            targetBranch: env/${{ vars.env }}
        - uses: argocd-update
          config:
            apps:
              - name: guestbook-${{ vars.env }}
                sources:
                  - repoURL: ${{ vars.gitRepo }}
                    desiredRevision: ${{ outputs.commit.commit }}
