apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: guestbook
  namespace: kargo-simple
spec:
  subscriptions:
    - image:
        # Public demo image. Tags 1.0 and 2.0 exist; semverConstraint
        # keeps any future mutable tags (latest, canary) out of the
        # discovery set.
        repoURL: gcr.io/google-samples/hello-app
        semverConstraint: ">=1.0.0"
        discoveryLimit: 20
