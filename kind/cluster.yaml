# Kind cluster config. Single control-plane node with host port mappings
# so Traefik's LoadBalancer Service can be reached at http://localhost.
# kind has no real LB — the extraPortMappings forward host ports through
# the kind container into the cluster, hitting Traefik on its NodePort.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: demo
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP — Traefik web listener
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      # HTTPS — Traefik websecure listener (when TLS gets added)
      - containerPort: 30443
        hostPort: 443
        protocol: TCP
