# Parameterized PromotionTask. Collapses the three byte-identical regional
# prod Stages (prod-us-east, prod-eu-west, prod-ap-southeast) into one
# shared step list parameterized on `region`.
#
# Without this Task, each region's Stage was ~120 lines of duplicate YAML.
# Now each region's Stage is ~30 lines: metadata + freight sources + a
# `taskRef` with `vars: { region: <name> }`.
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: regional-promote
  namespace: kargo-simple
spec:
  vars:
    - name: gitRepo
      value: https://github.com/<repo>
    - name: imageRepo
      value: ghcr.io/<user>/guestbook
    - name: region
      # The Stage referencing this Task supplies `region` via taskRef.vars.
      value: ""
    - name: env
      # Constructed: prod-<region>. Stages can override if naming differs.
      value: prod-${{ vars.region }}
  steps:
    - uses: git-clone
      config:
        repoURL: ${{ vars.gitRepo }}
        checkout:
          - branch: main
            path: ./src
          - branch: env/${{ vars.env }}
            create: true
            path: ./out
    - uses: helm-update-image
      as: update-image
      config:
        path: ./src/4-hybridmulticloud/env/values-${{ vars.env }}.yaml
        images:
          - image: ${{ vars.imageRepo }}
            key: image.digest
            value: ${{ imageFrom(vars.imageRepo).Digest }}
    - uses: helm-template
      config:
        path: ./src/4-hybridmulticloud/charts/guestbook
        valuesFiles:
          - ./src/4-hybridmulticloud/env/values-${{ vars.env }}.yaml
        outPath: ./src/manifests.yaml
    - uses: copy
      config:
        inPath: ./src/manifests.yaml
        outPath: ./out/rendered/${{ vars.env }}/manifests.yaml
    - uses: git-commit
      as: commit
      config:
        path: ./out
        message: ${{ outputs['update-image'].commitMessage }}
    - uses: git-push
      config:
        path: ./out
        targetBranch: env/${{ vars.env }}
    - uses: argocd-update
      config:
        apps:
          - name: guestbook-${{ vars.env }}
            sources:
              - repoURL: ${{ vars.gitRepo }}
                desiredRevision: ${{ outputs.commit.commit }}
