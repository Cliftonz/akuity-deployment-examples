apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: kargo-simple
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: guestbook
      sources:
        direct: true
  # After argocd-update reports the new revision applied, Kargo runs this
  # analysis. If it fails, the freight doesn't become eligible upstream.
  # "Argo CD says synced" isn't the same as "the app actually works."
  verification:
    analysisTemplates:
      - name: guestbook-http-probe
    args:
      - name: service-name
        value: guestbook
      - name: service-namespace
        value: guestbook-dev
  promotionTemplate:
    spec:
      vars:
        - name: gitRepo
          value: https://github.com/<repo>
        - name: imageRepo
          value: ghcr.io/<user>/guestbook
        - name: env
          value: dev
      # Step ordering matters: kustomize-build runs first, into a temp path.
      # Only on success does `copy` move the bytes into the env branch's
      # working tree. A failed render aborts before anything is written —
      # so the env branch never holds half-promoted output.
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.gitRepo }}
            checkout:
              - branch: main
                path: ./src
              - branch: env/${{ vars.env }}
                create: true
                path: ./out
        - uses: kustomize-set-image
          as: update-image
          config:
            path: ./src/0-kustomize/apps/guestbook/envs/${{ vars.env }}
            images:
              - image: ${{ vars.imageRepo }}
                # Pin the digest, not the tag. Re-tagging an approved digest
                # in GHCR no longer slips through; the freight identity is
                # the bytes, not the label.
                digest: ${{ imageFrom(vars.imageRepo).Digest }}
        - uses: kustomize-build
          config:
            path: ./src/0-kustomize/apps/guestbook/envs/${{ vars.env }}
            outPath: ./src/manifests.yaml
        - uses: copy
          config:
            inPath: ./src/manifests.yaml
            outPath: ./out/rendered/${{ vars.env }}/manifests.yaml
        - uses: git-commit
          as: commit
          config:
            path: ./out
            message: ${{ outputs['update-image'].commitMessage }}
        - uses: git-push
          config:
            path: ./out
            targetBranch: env/${{ vars.env }}
        - uses: argocd-update
          config:
            apps:
              - name: guestbook-${{ vars.env }}
                sources:
                  - repoURL: ${{ vars.gitRepo }}
                    desiredRevision: ${{ outputs.commit.commit }}
