# Onboard a new app by adding a list element.
#
# Demo simplification: Argo CD points at the per-env kustomize overlay on
# `main` and runs `kustomize build` at sync time. The full rendered-
# manifests pattern (env branches with hydrated YAML, no Argo-side
# rendering) is the production-shape design — see docs/rendered-manifests-
# pattern.md for the long-form rationale and how Kargo would write to
# env/<stage> branches when wired. Tiers 1+ keep that pattern.
#
# Single-cluster setup, so no cluster generator. The multi-cluster
# evolution lives in tier 4 with a cluster generator.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: business-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - app: guestbook
            env: dev
          - app: guestbook
            env: staging
          - app: guestbook
            env: prod
  template:
    metadata:
      name: '{{ .app }}-{{ .env }}'
      annotations:
        kargo.akuity.io/authorized-stage: 'kargo-simple:{{ .env }}'
    spec:
      project: business
      source:
        repoURL: https://github.com/Cliftonz/akuity-deployment-examples
        targetRevision: main
        path: '0-kustomize/apps/{{ .app }}/envs/{{ .env }}'
      destination:
        name: in-cluster
        namespace: '{{ .app }}-{{ .env }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
