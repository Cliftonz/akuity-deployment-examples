# Direct Application — component workloads aren't generator-driven on
# purpose. Each one is a deliberate PR review.
#
# selfHeal is off here. When ingress is the broken thing, on-call's first
# move is `kubectl edit` to contain. Auto-revert would fight them. Drift
# shows up as OutOfSync; a human syncs after the dust settles.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://github.com/<repo>
      targetRevision: HEAD
      path: 0-kustomize/platform/ingress-nginx
      directory:
        include: namespace.yaml
    - repoURL: https://kubernetes.github.io/ingress-nginx
      chart: ingress-nginx
      targetRevision: 4.15.1
      helm:
        releaseName: ingress-nginx
        valueFiles:
          - $values/platform/ingress-nginx/values.yaml
    - repoURL: https://github.com/<repo>
      targetRevision: HEAD
      ref: values
  destination:
    name: in-cluster
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
