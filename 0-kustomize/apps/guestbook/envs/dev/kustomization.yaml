apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: guestbook-dev

resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: guestbook
    patch: |-
      - op: replace
        path: /metadata/name
        value: guestbook-dev

images:
  - name: ghcr.io/<user>/guestbook
    newTag: v0.0.1

labels:
  - pairs:
      env: dev
    includeSelectors: false
