apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: guestbook-dev

resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: guestbook
    patch: |-
      - op: replace
        path: /metadata/name
        value: guestbook-dev
  - target:
      kind: HTTPRoute
      name: guestbook
    patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: guestbook-dev.local

images:
  - name: gcr.io/google-samples/hello-app
    newTag: "1.0"

labels:
  - pairs:
      env: dev
    includeSelectors: false
