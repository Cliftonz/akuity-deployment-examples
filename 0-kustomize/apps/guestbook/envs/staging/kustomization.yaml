apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: guestbook-staging

resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: guestbook
    patch: |-
      - op: replace
        path: /metadata/name
        value: guestbook-staging
  - target:
      kind: HTTPRoute
      name: guestbook
    patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: guestbook-staging.local
  - target:
      kind: Deployment
      name: guestbook
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

images:
  - name: gcr.io/google-samples/hello-app
    newTag: "1.0"

labels:
  - pairs:
      env: staging
    includeSelectors: false
