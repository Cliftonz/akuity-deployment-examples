apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: guestbook-staging

resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: guestbook
    patch: |-
      - op: replace
        path: /metadata/name
        value: guestbook-staging
  - target:
      kind: Deployment
      name: guestbook
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

images:
  - name: ghcr.io/<user>/guestbook
    newTag: v0.0.1

labels:
  - pairs:
      env: staging
    includeSelectors: false
