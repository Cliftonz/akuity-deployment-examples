apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: guestbook-default-deny
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: guestbook-allow-ingress
spec:
  podSelector:
    matchLabels:
      app: guestbook
  policyTypes: ["Ingress"]
  ingress:
    - from:
        # Match both the namespace label AND the pod label. If someone
        # misconfigures the ingress namespace, we don't accidentally allow
        # traffic; if someone runs an unrelated pod in that namespace, it
        # still doesn't get to talk to us.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: guestbook-allow-egress-dns
spec:
  podSelector:
    matchLabels:
      app: guestbook
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
