apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook
  labels:
    app.kubernetes.io/name: guestbook
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guestbook
  template:
    metadata:
      labels:
        app: guestbook
        app.kubernetes.io/name: guestbook
    spec:
      serviceAccountName: guestbook
      automountServiceAccountToken: false
      containers:
        - name: guestbook
          # No tag in the base. The env overlays' kustomize `images:` block
          # supplies the tag, and Kargo replaces it with a digest at promotion
          # time. Hardcoding `:latest` here was how a missed placeholder
          # rewrite used to ship a mutable tag to prod.
          #
          # Public demo image — gcr.io/google-samples/hello-app. Tags 1.0 and
          # 2.0 exist; Kargo's Warehouse semverConstraint discovers both.
          image: gcr.io/google-samples/hello-app
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
