apiVersion: v1
kind: Namespace
metadata:
  name: guestbook
  labels:
    app.kubernetes.io/name: guestbook
    app.kubernetes.io/part-of: business
    # Set the metadata.name label explicitly. kube-apiserver auto-applies it
    # on v1.22+, but agent-attached clusters can run older versions, and
    # NetworkPolicies match on this label — better to declare it than depend
    # on the server to fill it in.
    kubernetes.io/metadata.name: guestbook
    # Gateway API listener selector. Traefik's `traefik-gateway` listener
    # uses `allowedRoutes.namespaces.from: Selector` matching this label,
    # so HTTPRoutes in this namespace attach to the cluster Gateway in
    # the `traefik` namespace.
    routes-from: guestbook
    # Pod Security Admission is the admission-time backstop. NetworkPolicy
    # handles east-west; PSA stops a privileged container from landing here
    # in the first place.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
