# EXPECTED shape of the Postgres connection Secret. Terraform owns the
# `data` block in production; this manifest declares the metadata
# (name, namespace, labels) and a placeholder data block so Argo CD can
# track the Secret's existence as a watched resource.
#
# The Application syncing this manifest deliberately does NOT auto-sync
# (would overwrite Terraform's real values) and ignores the `data` field.
# When the Secret name in Terraform output drifts from `database.secretName`
# in the chart's values overlay, this Application reports `Missing` and
# the runbook at runbooks/infra/postgres-secret-name-drift.md fires.
apiVersion: v1
kind: Secret
metadata:
  name: guestbook-postgres-prod
  namespace: guestbook-prod
  labels:
    app.kubernetes.io/name: guestbook
    app.kubernetes.io/part-of: business
    managedBy: terraform-wild-west
type: Opaque
data:
  # Placeholder. Terraform replaces these with real connection details.
  # The Application's ignoreDifferences config keeps Argo CD from fighting.
  DATABASE_HOST: "PLACEHOLDER"
  DATABASE_PORT: "PLACEHOLDER"
  DATABASE_NAME: "PLACEHOLDER"
  DATABASE_USER: "PLACEHOLDER"
  DATABASE_PASSWORD: "PLACEHOLDER"
