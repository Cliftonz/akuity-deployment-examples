# Tier-2 runbook manifest. Inherits tier 1 and adds two infra-flavored
# runbooks that target the wild-west pain at this tier — PVC stuck pending
# (the Postgres TF module's storage), and the most insidious failure mode
# of the whole tier 2 setup: the Helm chart's `database.secretName` value
# drifts from the Terraform-created Secret name. The deployment then
# crashes with no clear error, and only this runbook points at the cause.
slackChannel: "#deploys"
runbooks:
  - file: argocd/app-sync-failure.md
    title: Argo CD Application sync failed
    trigger:
      resource: argoproj.io/Application
      state: SyncFailed
      durationSeconds: 60
    severity: sev2
    owner: platform-team
    autoclose:
      condition: status.sync.status == 'Synced'
      stableForSeconds: 300

  - file: argocd/app-degraded.md
    title: Argo CD Application Health = Degraded
    trigger:
      resource: argoproj.io/Application
      state: Degraded
      durationSeconds: 120
    severity: sev2
    owner: platform-team
    autoclose:
      condition: status.health.status == 'Healthy'
      stableForSeconds: 300

  - file: argocd/app-out-of-sync.md
    title: Argo CD Application stuck OutOfSync (autoSync disabled)
    trigger:
      resource: argoproj.io/Application
      state: OutOfSync
      durationSeconds: 600
    severity: sev3
    owner: platform-team

  - file: pod-issues/image-pull-failure.md
    title: Pod stuck in ImagePullBackOff
    trigger:
      resource: v1/Pod
      state: ImagePullBackOff
      durationSeconds: 120
    severity: sev2
    owner: platform-team

  - file: pod-issues/pod-health-issues.md
    title: Pod CrashLoopBackOff
    trigger:
      resource: v1/Pod
      state: CrashLoopBackOff
      durationSeconds: 180
    severity: sev2
    owner: platform-team

  - file: security/rbac-denials.md
    title: RBAC access denied (audit log)
    trigger:
      resource: audit.k8s.io/Event
      state: Forbidden
      durationSeconds: 0
    severity: sev3
    owner: security-team

  - file: infra/pvc-binding-failure.md
    title: PersistentVolumeClaim stuck Pending
    trigger:
      resource: v1/PersistentVolumeClaim
      state: Pending
      durationSeconds: 300
    severity: sev2
    owner: platform-team

  - file: infra/postgres-secret-name-drift.md
    title: Helm value database.secretName drifted from Terraform output
    trigger:
      resource: v1/Pod
      state: CreateContainerConfigError
      reasonContains: "secret \"guestbook-postgres-"
      durationSeconds: 60
    severity: sev1
    owner: platform-team
