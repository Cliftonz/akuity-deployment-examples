# Tier-2 drift visibility. The Terraform-created Postgres connection Secret
# lives in the app namespace, outside Argo CD's normal scope. This
# Application "watches" the Secret by syncing its expected shape (with
# placeholder data) and refusing self-heal — so any drift between what
# Terraform produced and what the chart expects shows up as OutOfSync in
# the Argo CD UI.
#
# The Application is INTENTIONALLY OutOfSync after Terraform runs because
# Terraform mutates the Secret data. That OutOfSync state is the demo —
# it's what tier 3 fixes by having Crossplane produce the Secret directly
# inside the GitOps loop.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-secret-watcher
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    notifications.argoproj.io/subscribe.on-sync-status-unknown.slack: <slack-channel>
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: business
  source:
    repoURL: https://github.com/Cliftonz/akuity-deployment-examples
    targetRevision: HEAD
    path: 2-terraform+helm/platform/postgres-secret-shape
  destination:
    name: in-cluster
    namespace: guestbook-prod
  syncPolicy:
    # Manual sync ONLY. self-heal would fight Terraform; auto-sync would
    # overwrite Terraform's data with the placeholder values below.
    automated: null
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: guestbook-postgres-prod
      jsonPointers:
        - /data        # ignore data — Terraform owns it
        - /metadata/managedFields
