# All Kargo CRs in one bundle. The argocd/ bootstrap creates an Argo CD
# Application that points here; Argo CD keeps these reconciled like anything
# else. So changes to the promotion model are a normal PR + sync away.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - projects/kargo-simple.yaml
  - projects/project-config.yaml
  - warehouses/guestbook.yaml
  - analysis-templates/guestbook-http-probe.yaml
  - analysis-templates/error-rate-prometheus.yaml
  - stages/dev.yaml
  - stages/staging.yaml
  - stages/prod.yaml
