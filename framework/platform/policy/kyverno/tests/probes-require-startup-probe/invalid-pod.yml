apiVersion: v1
kind: Pod
metadata:
  name: probes-startup-invalid
  namespace: kyverno-probes-startup
spec:
  containers:
    - name: app
      image: nginx:1.25
      ports:
        - containerPort: 8080
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 10
