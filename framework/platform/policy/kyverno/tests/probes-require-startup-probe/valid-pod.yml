apiVersion: v1
kind: Pod
metadata:
  name: probes-startup-valid
  namespace: kyverno-probes-startup
spec:
  containers:
    - name: app
      image: nginx:1.25
      ports:
        - containerPort: 8080
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 5
      startupProbe:
        httpGet:
          path: /startup
          port: 8080
        periodSeconds: 2
        failureThreshold: 30
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
