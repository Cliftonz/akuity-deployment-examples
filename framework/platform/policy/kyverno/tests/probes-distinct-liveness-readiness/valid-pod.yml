apiVersion: v1
kind: Pod
metadata:
  name: probes-distinct-valid
  namespace: kyverno-probes-distinct
spec:
  containers:
    - name: app
      image: nginx:1.25
      ports:
        - containerPort: 8080
      readinessProbe:
        httpGet:
          path: /ready
          port: 8080
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
