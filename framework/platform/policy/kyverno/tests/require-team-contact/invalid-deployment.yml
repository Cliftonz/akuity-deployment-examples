apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-contact-invalid
  namespace: team-contact-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: team-contact-invalid
  template:
    metadata:
      labels:
        app: team-contact-invalid
    spec:
      containers:
        - name: app
          image: nginx:1.25
          ports:
            - containerPort: 80
