apiVersion: v1
kind: Pod
metadata:
  name: probes-thresholds-valid
  namespace: kyverno-probes-thresholds
spec:
  containers:
    - name: app
      image: nginx:1.25
      ports:
        - containerPort: 8080
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        periodSeconds: 10
        failureThreshold: 3
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
