apiVersion: infra.k8/v1alpha1
kind: XResourceQuota
metadata:
  name: demo-app-quota
spec:
  name: demo-app-quota
  namespace: demo-app
  tier: dev
  cluster: demo
  owner: platform-team
  hard:
    requests.cpu: 500m
    requests.memory: 512Mi
    limits.cpu: "2"
    limits.memory: 2Gi
    pods: "10"
