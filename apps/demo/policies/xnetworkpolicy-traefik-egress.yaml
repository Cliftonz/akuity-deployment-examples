apiVersion: infra.k8/v1alpha1
kind: XNetworkPolicy
metadata:
  name: traefik-egress
spec:
  name: traefik-egress
  namespace: traefik
  tier: dev
  cluster: demo
  owner: platform-team
  policy:
    podSelector: {}
    policyTypes:
      - Egress
    egress:
      - to:
          - namespaceSelector: {}
        ports:
          - port: 53
            protocol: UDP
          - port: 53
            protocol: TCP
      - to:
          - ipBlock:
              cidr: 0.0.0.0/0
        ports:
          - port: 80
            protocol: TCP
          - port: 443
            protocol: TCP
          - port: 6443
            protocol: TCP
