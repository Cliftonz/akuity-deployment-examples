# ProjectConfig for the claim-promotion pipeline.
#
# Claim promotions are deliberately slower than chart promotions — a
# Postgres engine version bump touches every consumer. So nothing
# auto-promotes; every Stage is a manual click.
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: kargo-claims
  namespace: kargo-claims
spec:
  promotionPolicies: []
