apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "guestbook.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: guestbook
  template:
    metadata:
      labels:
        app: guestbook
        {{- include "guestbook.labels" . | nindent 8 }}
    spec:
      serviceAccountName: guestbook
      automountServiceAccountToken: false
      containers:
        - name: guestbook
          image: {{ include "guestbook.image" . }}
          ports:
            - name: http
              containerPort: {{ .Values.container.port }}
          {{- if .Values.database.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Values.database.secretName }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.container.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
