# Tier-3 task manifest. Inherits tier 1's tasks (sync-status, expiring-certificates)
# and adds three platform-engineering reports that are tier-3 territory:
# API deprecation tracking, over-provisioned workloads, image vulnerability
# scans. These map to the platform team's quarterly review cadence.
slackChannel: "#deploys"
tasks:
  - file: argocd/sync-status-report.md
    title: Weekly Argo CD sync-status report
    schedule: "0 9 * * 1"
    context: argocd
    deliverTo:
      kind: slack
      channel: "#deploys"
    owner: platform-team

  - file: security/expiring-certificates.md
    title: Certificates expiring in 30 days
    schedule: "0 9 * * 1"
    context: security
    deliverTo:
      kind: slack
      channel: "#security"
    owner: platform-team

  - file: platform/api-deprecation-report.md
    title: Deprecated Kubernetes API usage
    schedule: "0 9 1 * *"  # First of month
    context: platform
    deliverTo:
      kind: slack
      channel: "#platform"
    owner: platform-team

  - file: platform/over-provisioned-workloads-report.md
    title: Workloads using <30% of requested CPU/memory
    schedule: "0 9 * * 1"
    context: platform
    deliverTo:
      kind: slack
      channel: "#platform"
    owner: platform-team

  - file: security/image-vulnerability-report.md
    title: Image vulnerability scan summary
    schedule: "0 9 * * 1"
    context: security
    deliverTo:
      kind: slack
      channel: "#security"
    owner: security-team
