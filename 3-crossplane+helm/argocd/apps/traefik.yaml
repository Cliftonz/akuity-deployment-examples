# Traefik replaces ingress-nginx as the cluster ingress / Gateway API
# implementation. ingress-nginx (the Kubernetes-maintained chart) entered
# deprecation; Traefik is the active replacement and ships first-class
# Gateway API support, which is what HTTPRoutes in the business charts
# attach to.
#
# Direct Application — component workloads aren't generator-driven on
# purpose. Each one is a deliberate PR review.
#
# selfHeal is off here. When ingress is the broken thing, on-call's first
# move is `kubectl edit` to contain. Auto-revert would fight them. Drift
# shows up as OutOfSync; a human syncs after the dust settles.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.slack: <slack-channel>
    notifications.argoproj.io/subscribe.on-health-degraded.slack: <slack-channel>
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://github.com/Cliftonz/akuity-deployment-examples
      targetRevision: HEAD
      path: 3-crossplane+helm/platform/traefik
      directory:
        include: namespace.yaml
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: 32.1.1
      helm:
        releaseName: traefik
        valueFiles:
          - $values/platform/traefik/values.yaml
    - repoURL: https://github.com/Cliftonz/akuity-deployment-examples
      targetRevision: HEAD
      ref: values
  destination:
    name: in-cluster
    namespace: traefik
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
