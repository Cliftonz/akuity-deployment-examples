# Bootstrap entrypoint. `kubectl apply -k demo/argocd/` lands the
# AppProject, the ApplicationSet (which fans out to dev/staging/prod
# Applications), and the kargo-pipelines App that reconciles the Kargo
# control plane from demo/kargo/.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - projects/demo.yaml
  - applicationsets/guestbook.yaml
  - apps/kargo-pipelines.yaml
