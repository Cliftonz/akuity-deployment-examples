# Default values. Per-env overlays in env/values-{dev,staging,prod}.yaml
# override namespace, replicaCount, hostname. Kargo overwrites image.tag
# (or image.digest) at promotion time.

namespace: guestbook-demo

image:
  repository: gcr.io/google-samples/hello-app
  # Public registry only publishes 1.0 and 2.0 — pick a real tag so the
  # chart works pre-Kargo. Kargo's first promotion overwrites .digest
  # which then takes precedence.
  tag: "1.0"
  digest: ""

replicaCount: 1

# HTTPRoute attaches to the platform Traefik Gateway. Set enabled: false
# if the cluster has no Gateway API.
httpRoute:
  enabled: true
  gatewayName: traefik-gateway
  gatewayNamespace: traefik
  gatewaySectionName: web
  hostname: guestbook-demo.local
