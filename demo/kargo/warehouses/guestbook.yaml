apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: guestbook
  namespace: kargo-demo
spec:
  subscriptions:
    - image:
        # Public demo image. gcr.io/google-samples/hello-app publishes
        # tags `1.0` and `2.0` — those don't parse as full semver, so the
        # default SemVer strategy returns no references. Lexical sorts
        # tags alphanumerically and picks the highest.
        #
        # tagConstraint pins to `X.Y` numeric tags so any future mutable
        # tag (latest, canary, …) stays out of the discovery set.
        repoURL: gcr.io/google-samples/hello-app
        imageSelectionStrategy: Lexical
        tagConstraint: '^[0-9]+\.[0-9]+$'
        discoveryLimit: 20
