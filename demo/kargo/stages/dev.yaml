apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: kargo-demo
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: guestbook
      sources:
        direct: true
  promotionTemplate:
    spec:
      vars:
        - name: gitRepo
          value: https://github.com/Cliftonz/akuity-deployment-examples
        - name: imageRepo
          value: gcr.io/google-samples/hello-app
        - name: env
          value: dev
      # Render → commit → push → tell Argo CD. helm-update-image bumps the
      # digest in the per-env values file; helm-template renders the chart;
      # output lands on env/<env> branch as plain Kubernetes YAML.
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.gitRepo }}
            checkout:
              - branch: main
                path: ./src
              - branch: env/${{ vars.env }}
                create: true
                path: ./out
        # yaml-update is broader-compat than helm-update-image. Akuity's
        # hosted Kargo doesn't always carry the helm-update-image runner;
        # yaml-update is in the base set.
        - uses: yaml-update
          as: update-image
          config:
            path: ./src/demo/env/values-${{ vars.env }}.yaml
            updates:
              - key: imageDigest
                value: ${{ imageFrom(vars.imageRepo).Digest }}
        - uses: helm-template
          config:
            releaseName: guestbook
            path: ./src/demo/charts/guestbook
            valuesFiles:
              - ./src/demo/env/values-${{ vars.env }}.yaml
            outPath: ./src/manifests.yaml
        - uses: copy
          config:
            inPath: ./src/manifests.yaml
            outPath: ./out/demo/rendered/${{ vars.env }}/manifests.yaml
        - uses: git-commit
          as: commit
          config:
            path: ./out
            message: 'chore(${{ vars.env }}): bump guestbook image to ${{ imageFrom(vars.imageRepo).Tag }}'
        - uses: git-push
          config:
            path: ./out
            targetBranch: env/${{ vars.env }}
        - uses: argocd-update
          config:
            apps:
              - name: guestbook-demo-${{ vars.env }}
                sources:
                  - repoURL: ${{ vars.gitRepo }}
                    desiredRevision: ${{ outputs.commit.commit }}
