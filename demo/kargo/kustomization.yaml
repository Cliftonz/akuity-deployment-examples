# All Kargo CRs in one bundle. Apply via:
#   kubectl apply -k demo/kargo/
# or via an Argo CD Application pointing at this path (see
# demo/argocd/apps/kargo-pipelines.yaml).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - projects/kargo-demo.yaml
  - projects/project-config.yaml
  - warehouses/guestbook.yaml
  - analysis-templates/guestbook-http-probe.yaml
  - stages/dev.yaml
  - stages/staging.yaml
  - stages/prod.yaml
